name: Refresh Growth Book signal

on:
  schedule:
    # Every weekday at 22:30 UTC — ~1.5-2.5h after the US market close, so the
    # day's final QQQ price is settled. (GitHub may start scheduled runs a few
    # minutes late under load; that's fine for a daily close-based signal.)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy pandas yfinance

      - name: Recompute the signal
        run: python gen_signal.py

      - name: Commit if the signal changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signal.json
          git commit -m "refresh signal $(date -u +%F)" || echo "no change to commit"
          git push
